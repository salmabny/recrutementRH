@if (authService.showLogoutModal()) {
<div class="modal-overlay" (click)="cancel()">
    <div class="modal-premium-card animate-scale-up" style="max-width: 450px;" (click)="$event.stopPropagation()">
        <div class="modal-header-premium" style="border-bottom: none; padding-bottom: 0;">
            <div class="m-header-left">
                <div class="m-icon-box" style="background: rgba(239, 68, 68, 0.1); color: #ef4444;">
                    <!-- Logout door icon -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                </div>
                <div class="m-title-group">
                    <h3 style="color: #ef4444; margin: 0; font-size: 18px;">Confirmer la déconnexion</h3>
                </div>
            </div>
        </div>
        <div class="modal-body-premium" style="padding-top: 16px; padding-bottom: 24px;">
            <p style="color: #475569; font-size: 14.5px; line-height: 1.5; margin: 0;">
                Êtes-vous sûr de vouloir vous déconnecter de votre session ?
            </p>
            <p style="color: #94a3b8; font-size: 13px; margin-top: 8px; font-style: italic; margin-bottom: 0;">
                Vous devrez vous reconnecter pour accéder à vos données.
            </p>
        </div>
        <div class="modal-footer-premium"
            style="justify-content: center; gap: 12px; border-top: 1px solid #eef2f6; background: #fafafa; padding-top: 24px; padding-bottom: 24px;">
            <button class="btn-cancel-modal" (click)="cancel()">Annuler</button>
            <button class="btn-send-modal-premium"
                style="background: #ef4444; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);" (click)="confirm()">
                <div class="btn-content">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                        <polyline points="16 17 21 12 16 7" />
                        <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                    <span>Déconnexion</span>
                </div>
            </button>
        </div>
    </div>
</div>
}
