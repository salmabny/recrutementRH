<aside class="sidebar">
    <div class="sidebar-brand">
        <div class="brand-name">Smart<span class="brand-accent">Hiring</span></div>
        <div class="brand-role">ESPACE RECRUTEUR</div>
    </div>

    <nav class="sidebar-nav">
        <div class="nav-section-label">PRINCIPAL</div>

        <div class="nav-item" [class.active]="activeItem === 'dashboard'" (click)="navigateTo('/recruteur')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7" />
                <rect x="14" y="3" width="7" height="7" />
                <rect x="14" y="14" width="7" height="7" />
                <rect x="3" y="14" width="7" height="7" />
            </svg>
            <span>Vue globale</span>
        </div>

        <div class="nav-section-label">RECRUTEMENT</div>

        <div class="nav-item" [class.active]="activeItem === 'offres'" (click)="navigateTo('/recruteur/offres')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
            </svg>
            <span>Mes offres</span>
        </div>

        <div class="nav-item" [class.active]="activeItem === 'candidatures'"
            (click)="navigateTo('/recruteur/candidatures')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
            </svg>
            <span>Candidatures</span>
        </div>

        <div class="nav-item" [class.active]="activeItem === 'ranking'" (click)="navigateTo('/recruteur/ranking')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon
                    points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
            </svg>
            <span>Classement (IA)</span>
        </div>

        <div class="nav-section-label">PARAMÈTRES</div>

        <div class="nav-item" [class.active]="activeItem === 'profil'" (click)="navigateTo('/recruteur/profil')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
            </svg>
            <span>Mon profil</span>
        </div>
    </nav>

    <div class="sidebar-footer">
        <div class="user-card">
            <div class="user-info">
                <div class="user-name">{{ recruteur()?.prenom }} {{ recruteur()?.nom }}</div>
                <div class="user-role">Recruteur</div>
            </div>
            <button class="btn-logout" (click)="logout()" title="Déconnexion">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
            </button>
        </div>
    </div>
</aside>
